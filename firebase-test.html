<!DOCTYPE html>
<html>
<head>
    <title>Firebase Test</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Firebase Connection Test</h1>
    <div id="result">Testing Firebase connection...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsS...",
            authDomain: "slithub-17a41.firebaseapp.com",
            projectId: "slithub-17a41",
            storageBucket: "slithub-17a41.appspot.com",
            messagingSenderId: "1056588267605",
            appId: "1:1056588267605:web:0786..."
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Test immediately when page loads
        async function testFirebase() {
            try {
                const result = await db.collection('test').add({
                    message: "Test at " + new Date().toISOString(),
                    time: new Date()
                });
                document.getElementById('result').innerHTML = "✅ SUCCESS!<br>Document ID: " + result.id;
                document.getElementById('result').style.color = "green";
                document.getElementById('result').style.fontWeight = "bold";
            } catch(err) {
                document.getElementById('result').innerHTML = "❌ ERROR: " + err.message;
                document.getElementById('result').style.color = "red";
                document.getElementById('result').style.fontWeight = "bold";
            }
        }
        
        testFirebase();
    </script>
</body>
</html>
